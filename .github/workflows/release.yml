# Manual workflow: build and test, then semantic-release (version bump in package.json,
# CHANGELOG.md update, git tag, GitHub Release; npm publish optional / disabled).
# Commit messages must follow conventional commits for semantic-release to version correctly.
# Run from Actions → Release → Run workflow (choose branch, usually main).

name: Release

on:
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build, test, and release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.5.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare (ts-patch)
        run: pnpm run prepare

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm run test

      - name: Semantic release (@actor-bonilla/core)
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          # Uncomment when setting npmPublish to true and adding NPM_TOKEN to repo secrets:
          # NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        working-directory: packages/core
        run: pnpm exec semantic-release
